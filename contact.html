<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Contact Buttons */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeInUp 1s ease-out;
    }

    .contact-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #f39c12;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s, transform 0.3s;
    }

    .contact-btn:hover {
      background: #d35400;
      transform: scale(1.05);
    }

    /* Contact Form */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
      animation: fadeInUp 1.2s ease-out;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #f39c12;
      box-shadow: 0 0 8px rgba(243,156,18,0.4);
      outline: none;
    }

    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .char-count {
      font-size: 0.85rem;
      color: #666;
      margin-top: -8px;
      margin-bottom: 8px;
    }

    .contact-form button {
      padding: 12px;
      background: #f39c12;
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .contact-form button:hover {
      background: #d35400;
      transform: scale(1.05);
    }

    /* Success Message */
    .success-message {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #2ecc71;
      color: #fff;
      border-radius: 6px;
      animation: fadeIn 0.8s ease-out;
    }

    /* Error Styling */
    .error {
      border-color: #e74c3c !important;
      box-shadow: 0 0 8px rgba(231,76,60,0.4);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Theme toggle -->
  <button id="theme-toggle">🌙 Dark/Light</button>

  <!-- Header -->
  <header><h1>Contact Me</h1></header>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="projects.html">Projects</a>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h2>Get in Touch</h2>
    <p>If you’d like to collaborate or learn more about my work, feel free to reach out:</p>

    <!-- Contact Links styled as buttons -->
    <div class="contact-links">
      <a href="mailto:sadayabonjovi@gmail.com" class="contact-btn">📧 Email Me</a>
      <a href="tel:09562972094" class="contact-btn">📱 Call Me</a>
      <a href="https://facebook.com/bon.jovi.sadaya" target="_blank" class="contact-btn">📘 Facebook</a>
      <a href="https://linkedin.com/in/bonjovi" target="_blank" class="contact-btn">🔗 LinkedIn</a>
      <a href="https://github.com/sadayabonjovi-eng" target="_blank" class="contact-btn">🐙 GitHub</a>
    </div>

    <!-- Interactive Contact Form -->
    <form id="contactForm" action="https://formspree.io/f/yourFormID" method="POST" class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Tell me about your project or idea..." maxlength="500" required></textarea>
      <p class="char-count">0/500 characters</p>
      <button type="submit">Send Message</button>
      <div class="success-message">✅ Thanks for reaching out, I’ll get back to you soon!</div>
    </form>
  </div>

  <!-- Footer -->
  <footer><p>© 2026 Bon Jovi F. Sadaya</p></footer>

  <!-- Script for dark/light toggle + live char counter + feedback -->
  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });

    const textarea = document.querySelector('.contact-form textarea');
    const charCount = document.querySelector('.char-count');
    textarea.addEventListener('input', () => {
      charCount.textContent = `${textarea.value.length}/500 characters`;
    });

    const form = document.getElementById('contactForm');
    const successMessage = document.querySelector('.success-message');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      let valid = true;

      // Validate inputs
      form.querySelectorAll('input, textarea').forEach(field => {
        if (!field.value.trim()) {
          field.classList.add('error');
          valid = false;
        } else {
          field.classList.remove('error');
        }
      });

      if (valid) {
        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });
          if (response.ok) {
            successMessage.style.display = 'block';
            form.reset();
            charCount.textContent = "0/500 characters";
          } else {
            alert("❌ There was a problem sending your message. Please try again.");
          }
        } catch (error) {
          alert("❌ Network error. Please try again later.");
        }
      }
    });
  </script>
</body>
</html>
