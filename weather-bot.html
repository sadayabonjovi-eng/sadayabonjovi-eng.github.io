<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Weather Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="theme-toggle">🌙 Dark/Light</button>

  <header><h1>Email Weather Bot</h1></header>

  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="container">
    <h2>Overview</h2>
    <p>This project automatically fetches daily weather data and emails it to subscribers.</p>

    <h2>Features</h2>
    <ul>
      <li>Integrates with a weather API</li>
      <li>Sends automated daily emails</li>
      <li>Customizable city/location</li>
    </ul>

    <h2>Demo Screenshot</h2>
    <img src="images/weather-bot.png" alt="Weather Bot Screenshot" class="screenshot">
  </div>

  <footer><p>© 2026 Bon Jovi F. Sadaya</p></footer>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });
  </script>
</body>
</html>
